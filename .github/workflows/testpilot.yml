name: TestPilot AI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  SIEBEL_USERNAME: ${{ secrets.SIEBEL_USERNAME }}
  SIEBEL_PASSWORD: ${{ secrets.SIEBEL_PASSWORD }}
  SOLR_URL: ${{ secrets.SOLR_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  APP_URL: ${{ secrets.APP_URL || 'http://localhost:3000' }}

jobs:
  # ─── Step 1: AI Test Generation ──────────────────────────────────────────
  generate-tests:
    name: AI Generate Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TestPilot
        run: pip install -e "D:/Claude Project/testpilot-ai[dev]" 2>/dev/null || pip install -r requirements.txt

      - name: Generate tests for changed files
        run: python -m testpilot generate --diff origin/main

      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        with:
          name: ai-generated-tests
          path: tests/ai_generated/

  # ─── Step 2: Python + Siebel + SOLR Tests ────────────────────────────────
  backend-tests:
    name: Backend Tests (Python + Siebel + SOLR)
    runs-on: ubuntu-latest
    needs: generate-tests
    if: always()

    services:
      # Uncomment if you run SOLR locally in CI
      # solr:
      #   image: solr:9
      #   ports: ["8983:8983"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download AI-generated tests
        uses: actions/download-artifact@v4
        with:
          name: ai-generated-tests
          path: tests/ai_generated/
        continue-on-error: true   # OK if no PR / generation step skipped

      - name: Run pytest
        id: pytest
        run: |
          python -m pytest tests/ \
            --tb=short \
            --json-report \
            --json-report-file=/tmp/pytest-report.json \
            -v \
            2>&1 | tee /tmp/pytest-output.txt
        continue-on-error: true

      - name: Run SOLR validation
        id: solr
        run: python -m testpilot solr
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            /tmp/pytest-report.json
            /tmp/pytest-output.txt

      - name: Fail if tests failed
        if: steps.pytest.outcome == 'failure' || steps.solr.outcome == 'failure'
        run: exit 1

  # ─── Step 3: React E2E Tests ─────────────────────────────────────────────
  frontend-tests:
    name: React E2E (Playwright)
    runs-on: ubuntu-latest
    needs: backend-tests
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          cd testpilot-ai 2>/dev/null || true
          npx playwright install chromium --with-deps
          npm install playwright js-yaml 2>/dev/null || true

      - name: Start React app (if local)
        run: |
          if [ -f "package.json" ]; then
            npm install && npm start &
            npx wait-on http://localhost:3000 --timeout 30000
          fi
        continue-on-error: true

      - name: Run Playwright tests
        run: APP_URL=${{ env.APP_URL }} node scripts/playwright_runner.js
        continue-on-error: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: /tmp/testpilot-screenshots/

  # ─── Step 4: Notify ──────────────────────────────────────────────────────
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Send Telegram notification
        if: env.TELEGRAM_BOT_TOKEN != ''
        run: |
          BACKEND="${{ needs.backend-tests.result }}"
          FRONTEND="${{ needs.frontend-tests.result }}"

          if [[ "$BACKEND" == "success" && "$FRONTEND" == "success" ]]; then
            STATUS="✅ All tests passed"
          else
            STATUS="❌ Tests failed (backend: $BACKEND, frontend: $FRONTEND)"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>TestPilot AI — ${{ github.repository }}</b>
          PR: #${{ github.event.number }} | Branch: <code>${{ github.head_ref || github.ref_name }}</code>
          $STATUS"
